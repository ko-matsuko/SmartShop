{% extends "ec_site/base_store.html" %}
{% load static %}
{% block title %}数量の変更｜SmartShop{% endblock %}
{% block content %}
<div class="wrap" style="max-width:560px;">
  <nav class="crumb"><a href="/ec_site/cart/">カート</a> › 数量の変更</nav>
  <h1 class="ptitle">数量の変更</h1>
  <p class="psub">カート内の数量を変更します</p>
  <main class="formcard" style="width:auto;">
    <div class="litem" style="box-shadow:none;border:1px solid var(--line);margin-bottom:18px;">
      <div class="lthumb"><img src="{% get_static_prefix %}ec_site/img/products/{{ item_id }}.png" alt="{{ name }}" /></div>
      <div class="linfo"><div class="lm">{{ manufacturer }}</div><h3 class="ln">{{ name }}</h3><div class="lmeta">{{ color }} ・ ¥{{ price }}</div></div>
    </div>
    <form method="POST" action="/ec_site/cart/">
      {% csrf_token %}
      <input type="hidden" name="item_id" value="{{ item_id }}" />
      <div class="field"><label for="amount">数量</label>
        <select id="amount" name="amount">
          {% for n in num_list %}<option value="{{ n }}" {% if n == amount %}selected{% endif %}>{{ n }}</option>{% endfor %}
        </select>
      </div>
      <div style="display:flex;gap:12px;">
        <a class="btn btn-secondary" href="/ec_site/cart/">キャンセル</a>
        <button type="submit" class="btn btn-primary" style="flex:1;">数量を更新する</button>
      </div>
    </form>
  </main>
</div>
{% endblock %}
