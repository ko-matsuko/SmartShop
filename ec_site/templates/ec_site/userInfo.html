{% extends "ec_site/base_store.html" %}
{% load static %}
{% block title %}マイページ｜SmartShop{% endblock %}
{% block content %}
<div class="wrap" style="max-width:480px;">
  <h1 class="ptitle">マイページ</h1>
  <p class="psub">会員情報を確認できます</p>

  <div class="who-card">
      <div class="avatar"><svg viewBox="0 0 24 24" fill="none"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" stroke="currentColor" stroke-width="1.8"/><path d="M4 21a8 8 0 0 1 16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <div style="font-size:18px;font-weight:700;">{{ user.name }}</div>
      <div style="font-size:12.5px;color:var(--ink-soft);font-family:var(--font-display);margin-bottom:14px;">{{ user.user_id }}</div>
      <div class="drow"><span class="k">会員ID</span><span>{{ user.user_id }}</span></div>
      <div class="drow"><span class="k">お名前</span><span>{{ user.name }}</span></div>
      <div class="drow"><span class="k">ご住所</span><span>{{ user.address }}</span></div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
        <a class="btn btn-secondary" href="/ec_site/updateUserInfo/">会員情報を変更</a>
        <a class="btn" style="color:var(--ink-soft);" href="/ec_site/userLogout/">ログアウト</a>
      </div>
      <div style="margin-top:16px;padding-top:16px;border-top:1px dashed var(--line-2);">
        <a class="act del" style="width:100%;justify-content:center;border:1px solid var(--line-2);" href="/ec_site/withdrawConfirm/">退会手続きに進む</a>
      </div>
    </div>
</div>
{% endblock %}
