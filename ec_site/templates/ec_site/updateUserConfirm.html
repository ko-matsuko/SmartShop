{% extends "ec_site/base_store.html" %}
{% block title %}変更内容の確認｜SmartShop{% endblock %}
{% block content %}
<div class="wrap" style="max-width:560px;">
  <nav class="crumb"><a href="/ec_site/userInfo/">マイページ</a> › 会員情報の変更 › 確認</nav>
  <h1 class="ptitle">変更内容の確認</h1>
  <p class="psub">以下の内容で更新します。よろしいですか？</p>

  <main class="formcard" style="width:auto;">
    <div class="drow" style="border-top:none;"><span class="k">会員ID</span><span>{{ user_id }}</span></div>
    <div class="drow"><span class="k">パスワード</span><span>••••••••</span></div>
    <div class="drow"><span class="k">お名前</span><span>{{ name }}</span></div>
    <div class="drow"><span class="k">ご住所</span><span>{{ address }}</span></div>
    <form method="POST" action="{% url 'ec_site:update_user_confirm' %}" style="display:flex;gap:12px;margin-top:20px;">
      {% csrf_token %}
      <input type="hidden" name="password" value="{{ password }}" />
      <input type="hidden" name="name" value="{{ name }}" />
      <input type="hidden" name="address" value="{{ address }}" />
      <a class="btn btn-secondary" href="/ec_site/updateUserInfo/">修正する</a>
      <button type="submit" class="btn btn-primary" style="flex:1;">この内容で更新する</button>
    </form>
  </main>
</div>
{% endblock %}
