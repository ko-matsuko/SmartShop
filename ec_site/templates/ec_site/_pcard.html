{% load static %}
<article class="pcard">
  <div class="thumb">
    <img src="{% get_static_prefix %}ec_site/img/products/{{ item.item_id }}.png" alt="{{ item.name }}" loading="lazy" />
    {% if item.recommended %}<span class="badge">★ オススメ</span>{% endif %}
  </div>
  <div class="pbody">
    <div class="maker">{{ item.manufacturer }}</div>
    <h3 class="pname"><a href="/ec_site/itemDetail/{{ item.item_id }}">{{ item.name }}</a></h3>
    <div class="pmeta">
      <span class="color-chip"><span class="dot" style="background:{% if item.color == 'ブラウン' %}#8b5e3c{% elif item.color == 'ベージュ' %}#d9c3a3{% elif item.color == 'ブラック' %}#2b2b2b{% elif item.color == 'ネイビー' %}#2a3a5e{% elif item.color == 'ナチュラル' %}#e6dcc6{% else %}#cccccc{% endif %}"></span>{{ item.color }}</span>
      <span class="stock {% if item.stock <= 15 %}low{% endif %}">{% if item.stock <= 15 %}残り{{ item.stock }}点{% else %}在庫あり{% endif %}</span>
    </div>
    <div class="price-row"><span class="yen">¥</span><span class="val">{{ item.price }}</span><span class="tax">税込</span></div>
    <form action="/ec_site/cart/" method="POST">
      {% csrf_token %}
      <input type="hidden" name="item_id" value="{{ item.item_id }}" />
      <input type="hidden" name="amount" value="1" />
      <button class="add" type="submit">
        <svg viewBox="0 0 24 24" fill="none"><path d="M2.5 3h2.2l1.3 12.1a1.5 1.5 0 0 0 1.5 1.34h9.1a1.5 1.5 0 0 0 1.46-1.14L21 7.2H6.1" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        カートに入れる
      </button>
    </form>
  </div>
</article>
