{% extends "ec_site/base_admin.html" %}
{% block title %}商品登録｜SmartShop 管理{% endblock %}
{% block heading %}商品登録{% endblock %}
{% block nav_create %}on{% endblock %}
{% block content %}
<nav class="crumb"><a href="/ec_site/adminItemList/">商品一覧</a> › 商品登録</nav>
<form class="formcard-admin" method="POST" action="/ec_site/adminItemCreate/" novalidate>
  {% csrf_token %}
  {% include "ec_site/_item_form_fields.html" %}
  <div class="formfoot">
    <a class="btn btn-secondary" href="/ec_site/adminItemList/">キャンセル</a>
    <button type="submit" class="btn btn-primary" style="flex:1;">商品を登録する</button>
  </div>
</form>
{% endblock %}
